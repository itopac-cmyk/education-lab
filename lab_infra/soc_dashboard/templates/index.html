<!DOCTYPE html>
<html>
<head>
    <title>LAT-OT Education SOC Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #121212; color: #00ff00; font-family: 'Courier New', monospace; }
        .alert-card { background: #1e1e1e; border: 1px solid #333; margin-bottom: 10px; padding: 10px; }
        .Critical { border-left: 5px solid #ff0000; }
        .High { border-left: 5px solid #ff8800; }
    </style>
</head>
<body class="container mt-4">
    <h1><span class="text-white">THREAT MANAGEMENT:</span> LIVE ALERTS</h1>
    <div id="alerts-container"></div>

    <script>
        function fetchAlerts() {
            fetch('/api/alerts')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('alerts-container');
                    container.innerHTML = '';
                    data.reverse().forEach(alert => {
                        const div = document.createElement('div');
                        div.className = \`alert-card \${alert.level}\`;
                        div.innerHTML = \`
                            <strong>[\${alert.timestamp}] \${alert.title}</strong><br>
                            <small>Source: \${alert.source} | Level: \${alert.level}</small><br>
                            <p>\${alert.description}</p>
                        \`;
                        container.appendChild(div);
                    });
                });
        }
        setInterval(fetchAlerts, 2000);
        fetchAlerts();
    </script>
</body>
</html>
