<!DOCTYPE html>
<html>
<head>
    <title>Zero-Day Education Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0b0e14; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; transition: 0.3s; margin-bottom: 20px; }
        .card:hover { border-color: #58a6ff; transform: translateY(-5px); }
        .badge { background: #238636; }
        .btn-primary { background: #21262d; border-color: #30363d; color: #58a6ff; }
        .btn-primary:hover { background: #30363d; border-color: #8b949e; }
        h1 { color: #58a6ff; font-weight: bold; }
        .nav-link { color: #8b949e; }
    </style>
</head>
<body class="container py-5">
    <header class="text-center mb-5">
        <h1>ZERO-DAY EDUCATION LAB <span class="badge">APRIL 2026</span></h1>
        <p class="lead">Interactive Seminar Environment for Threat Management & Ethical Hacking</p>
    </header>

    <div class="row">
        {% for s in scenarios %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title text-white">Scenario {{ s.id }}: {{ s.name }}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">{{ s.tech }}</h6>
                    <p class="card-text">{{ s.description }}</p>
                    <a href="{{ s.url }}" target="_blank" class="btn btn-sm btn-primary">Open Scenario</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <footer class="mt-5 text-center text-muted">
        <small>Developed by Isa Topac | Hochschule Aalen | M.Sc. Cyber Security</small>
    </footer>
</body>
</html>
